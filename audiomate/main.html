        function keresettVideoIdo(seconds) {
            if (seconds === "LIVE") {
                return "LIVE";
            }
            let perc = Math.floor(seconds / 60);
            let masodperc = Math.floor(seconds % 60);
            let ora = Math.floor(perc / 60);
            if (ora > 0) {
                perc = perc % 60;
            }

            //console.log(seconds);

            //console.log(`${mins}:${secs < 10 ? '0' : ''}${secs}`);

            if (ora === 0) {
                return `${perc}:${masodperc < 10 ? '0' : ''}${masodperc}`;
            }

            if (ora != 0 && perc < 10) {
                return `${ora}:` + `0` + `${perc}:${masodperc < 10 ? '0' : ''}${masodperc}`;
            }
            return `${ora}:${perc}:${masodperc < 10 ? '0' : ''}${masodperc}`;
        }

        function videoHosszAtAlakit(alakito) {

            if (alakito === null) {
                return 0;
            }


            const regex = /PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/;
            const illik = alakito.match(regex);


            if (!illik) {
                return 0;
            }

            const ora = parseInt(illik[1]) || 0;
            const perc = parseInt(illik[2]) || 0;
            const masodperc = parseInt(illik[3]) || 0;
            //console.log(ora, perc, masodperc);
            return ora * 3600 + perc * 60 + masodperc;
        }

        function keres() {
            console.log("anyad");
            const search = document.getElementById("search").value;
            const eredmeny = document.getElementById("eredmeny");

            if (search.length < 3) {
                eredmeny.innerHTML = "<p>Írj be legalább 3 karaktert...</p>";
                return;
            }

            eredmeny.innerHTML = "<p>Keresés folyamatban...</p>";

            const apikulcs = "AIzaSyDwBB_Wm1JSYl_OKcd-yIC55IZebRLje4Q";
            //const apikulcs2 = "AIzaSyDwBB_Wm1JSYl_OKcd-yIC55IZebRLje4Q";
            const URL = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=5&q=${encodeURIComponent(search)}&key=${apikulcs}`;


            function lekerVideok(vissza) {

                let van = 0;
                fetch(URL)
                    .then(valasz => valasz.json())
                    .then(adatok => {
                        console.log(adatok);
                        const videoIds = adatok.items
                            .map(item => item.id.videoId)
                            .join(",");

                        const detailsURL =
                            `https://www.googleapis.com/youtube/v3/videos` +
                            `?part=contentDetails` +
                            `&id=${videoIds}` +
                            `&key=${apikulcs}`;



                        fetch(detailsURL)
                            .then(v => v.json())
                            .then(details => {
                                const videok = adatok.items
                                    .filter(item => item.id.kind === 'youtube#video')
                                    .map((item, i) => ({
                                        csatorna: item.id.kind,
                                        videoId: item.id.videoId,
                                        title: item.snippet.title,
                                        img: item.snippet.thumbnails.medium.url,
                                        nagyobbImg: item.snippet.thumbnails.high.url,
                                        duration: videoHosszAtAlakit(details.items[i].contentDetails.duration) == 0 ? "LIVE" : videoHosszAtAlakit(details.items[i].contentDetails.duration),
                                        durationRaw: details.items[i].contentDetails.duration
                                    })).slice(0, 5);

                                vissza(videok);
                            });
                    });
            }


            lekerVideok(function (videok) {
                eredmeny.innerHTML = "";

                if (!videok.length) {
                    eredmeny.innerHTML = "<p>Nincs találat vagy hiba történt.</p>";
                    return;
                }

                for (let i = 0; i < videok.length; i++) {
                    let keret = document.createElement("div");
                    keret.classList.add("container");

                    let talalat = document.createElement("div");

                    talalat.innerHTML = `
                    <div class="row mb-3 p-2 rounded video talalat">
                        <div class="col-4">
                            <img src="${videok[i].img}"  class="img-fluid rounded"/>
                        </div>
                        <div class="col-8 text-light">
                            <h3 class="text-truncate">${videok[i].title} </h3>
                            <h4>${keresettVideoIdo(videok[i].duration)}</h4>
                        </div>
                    </div>
                    `;

                    talalat.onclick = () => {
                        eredmenyTorol();


                        insertIntoMusic(videok[i].videoId, videok[i].title, videok[i].duration)
                            .then(musicId => insertIntoPlaylist(musicId));


                    };

                    keret.appendChild(talalat);
                    eredmeny.appendChild(keret);
                }
            });
        }

        function search() {

                    muvelet: "search",
                    search: document.getElementById("search").value
                })

            })

                .then(response => response.json())
                .then(data => {
                    console.log(data);

                    let eredmeny = document.getElementById("eredmeny");
                    let videok = data.results;

                    eredmeny.innerHTML = "";

                    console.log("EREDMENY TOROLVE");

                    if (!videok.length) {
                        eredmeny.innerHTML = "<p>Nincs találat vagy hiba történt.</p>";
                        return;
                    }

                    for (let i = 0; i < videok.length; i++) {
                        let keret = document.createElement("div");
                        keret.classList.add("container");

                        let talalat = document.createElement("div");

                        talalat.innerHTML = embedSearchItem(videok[i].video_id, videok[i].title, (videok[i].length) == 0 ? "LIVE" : videok[i].length);

                        console.log(videok[i].video_id);


                        talalat.onclick = () => {
                            eredmenyTorol();

                            insertIntoMusic(videok[i].video_id, videok[i].title, videok[i].length)
                                .then(musicId => insertIntoPlaylist(musicId));
                        };

                        keret.appendChild(talalat);
                        eredmeny.appendChild(keret);
                    }


                });
        }

        function update() {
            getCurrentTime();
            getVolume();
            ido();

            isPlaying().then(status => {
                if (status == 0) {
                    document.getElementById("play").classList.remove("d-none");
                    document.getElementById("pause").classList.add("d-none");
                } else {
                    document.getElementById("pause").classList.remove("d-none");
                    document.getElementById("play").classList.add("d-none");
                }
            })

            loadPlaylist().then(data => {
                document.getElementById("playlist").innerHTML = "";
                data.forEach(e => {
                    document.getElementById("playlist").innerHTML += embedPlaylistItem(e.video_id, e.title, (e.length) == 0 ? "LIVE" : e.length);
                });
            })

            loadCurrentlyPlaying().then(data => {
                if (videoId != data.video_id) {
                    console.log(data);
                    videoId = data.video_id;
                    embedVideo(data.video_id, "https://img.youtube.com/vi/" + data.video_id + "/maxresdefault.jpg", data.title);
                    seekSlider = document.querySelector("#seekSlider");
                    volumeSlider = document.querySelector("#volumeSlider");

                    getLength();

                    // Húzás kezdetén
                    seekSlider.addEventListener("pointerdown", () => felhasznaloSeek = true);
                    seekSlider.addEventListener("pointerleave", () => felhasznaloSeek = false);

                    // Hangerő kezdetén
                    volumeSlider.addEventListener("pointerdown", () => felhasznaloVolume = true);
                    volumeSlider.addEventListener("pointerleave", () => felhasznaloVolume = false);


                    // Húzás közben tároljuk az értéket
                    seekSlider.addEventListener("input", function () {
                        if (felhasznaloSeek) {
                            porget = this.value;
                        }
                    });

                    volumeSlider.addEventListener("input", function () {
                        if (felhasznaloVolume) {
                            volume = this.value;
                        }
                    });

                    volumeSlider.addEventListener("pointerup", function () {
                        if (!felhasznaloVolume) return;
                        felhasznaloVolume = false;
                        setVolume();
                    });

                    seekSlider.addEventListener("pointerup", function () {
                        if (!felhasznaloSeek) return;
                        felhasznaloSeek = false;
                        setPorget();
                    });
                }
            })
        }


        setInterval(update, 1000);

        document.getElementById("search").addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                keres();
                search();
                eredmenyVisszahoz();
                //console.log("asdasd");

        });
