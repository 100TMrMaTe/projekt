<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div style="margin: 20px;">
        <button>
            play/pause
        </button>
    </div>
    <div style="margin: 20px;">
        <label for="seekSlider">Idő:</label>
        <input type="range" value="0" id="seekSlider" style="width: 300px;">
    </div>
    <div style="margin: 20px;">
        <label for="volumeSlider">Hangerő:</label>
        <input type="range" max="100" value="100" id="volumeSlider" style="width: 100px;">
    </div>

    <script>
        document.querySelector("button").addEventListener("click", function () {
            fetch("../../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "kapcsolo"
                })
            })
                .then(response => response.json())
                .then(data => {
                    console.log(data);
                })
        });

        document.querySelector("#seekSlider").addEventListener("mouseup", function () {
            console.log(document.querySelector("#seekSlider").value);
            fetch("../../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "seek",
                    ido: document.querySelector("#seekSlider").value
                })
            })
                .then(response => response.json())
                .then(data => {
                    console.log(data);
                })
        });

        document.querySelector("#volumeSlider").addEventListener("mouseup", function () {
            console.log(document.querySelector("#volumeSlider").value);
            fetch("../../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "volume",
                    hangero: document.querySelector("#volumeSlider").value
                })
            })
                .then(response => response.json())
                .then(data => {
                    console.log(data);
                })
        });

        fetch("../../index.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                muvelet: "length",
            })
        })
            .then(response => response.json())
            .then(data => {
                console.log(data);
                document.querySelector("#seekSlider").max = data.length;
            });

        function seekUpdate(){
            fetch("../../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "current_time",
                })
            })
                .then(response => response.json())
                .then(data => {
                    console.log(data);
                    document.querySelector("#seekSlider").value = data.current_time;
                });
        }

        setInterval(seekUpdate, 1000);
    </script>
</body>

</html>
