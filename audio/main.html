		// Alias-ok a régi kód kompatibilitásához
		Object.defineProperty(window, 'seeking', { get: () => felhasznaloSeek, set: v => { felhasznaloSeek = v; } });

		let interval = null;
		const DURATION = 30 * 60;
		let totalSeconds = DURATION;

		function updateDisplay() {
			const minutes = Math.floor(totalSeconds / 60);
			const seconds = totalSeconds % 60;

			document.getElementById("timer").textContent =
				String(minutes).padStart(2, "0") +
				":" +
				String(seconds).padStart(2, "0");
		}

		function startTimer() {
			clearInterval(interval);

			totalSeconds = DURATION;
			updateDisplay();

			interval = setInterval(() => {
				if (totalSeconds > 0) {
					totalSeconds--;
					updateDisplay();
				} else {
					clearInterval(interval);
					interval = null;
					alert("Lejárt az idő!");
				}
			}, 1000);
		}

		startTimer();

		function tokenRefresh() {
			fetch("../index.php", {
				method: "POST",
				headers: { "Content-Type": "application/json" },
				body: JSON.stringify({
					muvelet: "tokenRefresh",
					token: localStorage.getItem("token"),
				}),
			})
				.then((response) => response.json())
				.then((data) => {
					if (data.status != "success_token_refresh") {
						localStorage.clear();
						window.location.href = "../login/login.html";
					}
				})
				.catch((error) => console.error("Error refreshing token:", error));
		}

			fetch("../index.php", {

					user_id: localStorage.getItem("user_id"),

			let perc = Math.floor(jelenlegi / 60);
			let masodperc = Math.floor(jelenlegi % 60);
			let ora = Math.floor(perc / 60);

			let teljesMasodperc = Math.floor(teljes % 60);
			let teljesOra = Math.floor(teljesPerc / 60);

			let jelenlegiIdo = document.getElementById("jelenlegiIdo");
			let egeszIdo = document.getElementById("egeszIdo");

			if (teljesOra > 0) {
				teljesPerc = teljesPerc % 60;
			}
			// document.getElementById("jelenlegiIdo").innerText = perc + ":" + masodperc;
			//console.log(teljesOra + ":" + teljesPerc + ":" + teljesMasodperc);

			if (teljesOra === 0) {
				egeszIdo.innerText = `${teljesPerc}:${teljesMasodperc < 10 ? "0" : ""}${teljesMasodperc}`;
			}
			//console.log(ora);

			if (teljesOra != 0) {
				if (teljesPerc < 10) {
					egeszIdo.innerText =
						`${teljesOra}:` +
						`0` +
						`${teljesPerc}:${teljesMasodperc < 10 ? "0" : ""}${teljesMasodperc}`;
					//console.log("cadsd");
				}
				egeszIdo.innerText = `${teljesOra}:${teljesPerc}:${teljesMasodperc < 10 ? "0" : ""}${teljesMasodperc}`;
			}

			if (ora > 0) {
				perc = perc % 60;
			}
			// document.getElementById("jelenlegiIdo").innerText = perc + ":" + masodperc;

			if (ora === 0) {
				jelenlegiIdo.innerText = `${perc}:${masodperc < 10 ? "0" : ""}${masodperc}`;
				//egeszIdo.innerText = `${perc}:${masodperc < 10 ? '0' : ''}${masodperc}`;

				//console.log(ora);
			}
			if (ora != 0) {
				if (perc < 10) {
					jelenlegiIdo.innerText =
						`${ora}:` +
						`0` +
						`${perc}:${masodperc < 10 ? "0" : ""}${masodperc}`;
					//egeszIdo.innerText = `${ora}:` + `0` + `${perc}:${masodperc < 10 ? '0' : ''}${masodperc}`;
				} else {
					jelenlegiIdo.innerText = `${ora}:${perc}:${masodperc < 10 ? "0" : ""}${masodperc}`;
					//egeszIdo.innerText = `${ora}:${perc}:${masodperc < 10 ? '0' : ''}${masodperc}`;
				}
			}

			//document.getElementById("egeszIdo").innerText = Math.floor(teljes / 60) + ":" + Math.floor(teljes % 60);

			//math.floor ataliitasa (round-ra)
		}

		function keresettVideoIdo(seconds) {
			if (seconds === "LIVE") {
				return "LIVE";
			}
			let perc = Math.floor(seconds / 60);
			let masodperc = Math.floor(seconds % 60);
			let ora = Math.floor(perc / 60);
			if (ora > 0) {
				perc = perc % 60;
			}

			//console.log(seconds);

			//console.log(`${mins}:${secs < 10 ? '0' : ''}${secs}`);

			if (ora === 0) {
				return `${perc}:${masodperc < 10 ? "0" : ""}${masodperc}`;
			}

			if (ora != 0 && perc < 10) {
				return (
					`${ora}:` + `0` + `${perc}:${masodperc < 10 ? "0" : ""}${masodperc}`
				);
			}
			return `${ora}:${perc}:${masodperc < 10 ? "0" : ""}${masodperc}`;
		}

		function videoHosszAtAlakit(alakito) {
			if (alakito === null) {
				return 0;
			}

			const regex = /PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/;
			const illik = alakito.match(regex);

			if (!illik) {
				return 0;
			}

			const ora = parseInt(illik[1]) || 0;
			const perc = parseInt(illik[2]) || 0;
			const masodperc = parseInt(illik[3]) || 0;
			//console.log(ora, perc, masodperc);
			return ora * 3600 + perc * 60 + masodperc;
		}

		function keres() {
			//console.log("anyad");
			const search = document.getElementById("search").value;
			const eredmeny = document.getElementById("eredmeny");

			if (search.length < 3) {
				eredmeny.innerHTML = "<p>Írj be legalább 3 karaktert...</p>";
				return;
			}

			eredmeny.innerHTML = "<p>Keresés folyamatban...</p>";

			//const apikulcs = "AIzaSyAvqcZuWfXHENDGZOhjSKoKyaZe4xGtTVM";
			const apikulcs2 = "AIzaSyAjhNmbvJwzwac3JK-UxQFId23xWsn10-E";
			const URL = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&mqdefault=5&q=${encodeURIComponent(search)}&key=${apikulcs2}`;

			function lekerVideok(vissza) {
				let van = 0;
				fetch(URL)
					.then((valasz) => valasz.json())
					.then((adatok) => {
						//console.log(adatok);
						const videoIds = adatok.items
							.map((item) => item.id.videoId)
							.join(",");

						const detailsURL =
							`https://www.googleapis.com/youtube/v3/videos` +
							`?part=contentDetails` +
							`&id=${videoIds}` +
							`&key=${apikulcs2}`;

						fetch(detailsURL)
							.then((v) => v.json())
							.then((details) => {
								const videok = adatok.items
									.filter((item) => item.id.kind === "youtube#video")
									.map((item, i) => ({
										csatorna: item.id.kind,
										videoId: item.id.videoId,
										title: item.snippet.title,
										img: item.snippet.thumbnails.medium.url,
										nagyobbImg: item.snippet.thumbnails.high.url,
										duration:
											videoHosszAtAlakit(
												details.items[i].contentDetails.duration,
											) == 0
												? "LIVE"
												: videoHosszAtAlakit(
													details.items[i].contentDetails.duration,
												),
										durationRaw: details.items[i].contentDetails.duration,
									}))
									.slice(0, 5);
								vissza(videok);
							});
					});
			}

			lekerVideok(function (videok) {
				eredmeny.innerHTML = "";

				if (!videok.length) {
					eredmeny.innerHTML = "<p>Nincs találat vagy hiba történt.</p>";
					return;
				}

				for (let i = 0; i < videok.length; i++) {
					let keret = document.createElement("div");
					keret.classList.add("container");

					let talalat = document.createElement("div");

					talalat.innerHTML = `
                    <div class="row mb-2 p-2 rounded video talalat">
                        <div class="col-4">
                            <img src="${videok[i].img}"  class="img-fluid rounded"/>
                        </div>
                        <div class="col-8 text-light">
                            <h2 class="text-truncate">${videok[i].title} </h2>
                            <h2>${keresettVideoIdo(videok[i].duration)}</h2>
                        </div>
                    </div>
                    `;

					talalat.onclick = () => {
						eredmenyTorol();

						insertIntoMusic(
							videok[i].videoId,
							videok[i].title,
							videok[i].duration,
						).then((musicId) => insertIntoPlaylist(musicId));
					};

					keret.appendChild(talalat);
					eredmeny.appendChild(keret);
				}
			});
		}

		let utolsoPlaylist = "";

		function update() {
		//	getCurrentTime();
			//getVolume();
			if (seekSlider && hossz) ido();

			isPlaying().then((status) => {
				const isPlay = status == 0;
				// Asztali gombok
				const playBtn = document.getElementById("play");
				const pauseBtn = document.getElementById("pause");

				if (playBtn && pauseBtn) {
					if (isPlay) {
						playBtn.classList.remove("d-none");
						pauseBtn.classList.add("d-none");
					} else {
						pauseBtn.classList.remove("d-none");
						playBtn.classList.add("d-none");
					}
				}
				// Mobil gombok
				const mp = document.getElementById("mobile-play-icon");
				const mpa = document.getElementById("mobile-pause-icon");
				if (mp && mpa) {
					if (isPlay) {
						mp.classList.remove("d-none");
						mpa.classList.add("d-none");
					} else {
						mpa.classList.remove("d-none");
						mp.classList.add("d-none");
					}
				}
			});



			loadCurrentlyPlaying().then((data) => {
				if (videoId != data.video_id) {
					//console.log(data);
					videoId = data.video_id;
					embedVideo(
						data.video_id,
						"https://img.youtube.com/vi/" +
						data.video_id +
						"/mqdefault.jpg",
						data.title,
						data.music_id,
					);
					seekSlider = document.querySelector("#seekSlider");
					volumeSlider = document.querySelector("#volumeSlider");

					getLength();

					// ─── Desktop seekSlider ───
					seekSlider.addEventListener("pointerdown", () => { felhasznaloSeek = true; });

					seekSlider.addEventListener("input", function () {
						felhasznaloSeek = true; // biztosítjuk, ha pointerdown lemaradt
						porget = this.value;
						if (mobileSeekSlider) mobileSeekSlider.value = this.value;
					});

					// document-szintű pointerup: ha az egér a slidertől távol engedi el
					document.addEventListener("pointerup", function () {
						if (felhasznaloSeek) {
							porget = seekSlider.value;
							if (mobileSeekSlider) mobileSeekSlider.value = seekSlider.value;
							felhasznaloSeek = false;
							setPorget();
						}
						if (felhasznaloVolume) {
							volume = volumeSlider.value;
							if (mobileVolumeSlider) mobileVolumeSlider.value = volumeSlider.value;
							felhasznaloVolume = false;
							setVolume();
						}
					}, { once: false });

					// ─── Desktop volumeSlider ───
					volumeSlider.addEventListener("pointerdown", () => { felhasznaloVolume = true; });

					volumeSlider.addEventListener("input", function () {
						felhasznaloVolume = true;
						volume = this.value;
						if (mobileVolumeSlider) mobileVolumeSlider.value = this.value;
					});

					volumeSlider.addEventListener("pointerup", function () {
						if (!felhasznaloVolume) return;
						felhasznaloVolume = false;
						volume = this.value;
						if (mobileVolumeSlider) mobileVolumeSlider.value = this.value;
						setVolume();
					});

					volumeSlider.addEventListener("pointercancel", function () {
						if (!felhasznaloVolume) return;
						felhasznaloVolume = false;
						setVolume();
					});
				}
			});
		}

		setInterval(() => {	
			loadPlaylist().then((data) => {
				const ujPlaylist = data.map(e => e.video_id).join(",");

				if (ujPlaylist === utolsoPlaylist) return; // nem változott, ne csináljunk semmit
				utolsoPlaylist = ujPlaylist;

				});
			});
		}, 1500);

	<script>
		const mobileSeekSlider = document.getElementById("mobile-seek-slider");
		const mobileVolumeSlider = document.getElementById("mobile-volume-slider");

		// Segédfüggvény: touch + pointer eseményekre egyszerre regisztrál
		function onDragStart(el, fn) {
			el.addEventListener("pointerdown", fn);
			el.addEventListener("touchstart", fn, { passive: true });
		}
		function onDragEnd(el, fn) {
			el.addEventListener("pointerup", fn);
			el.addEventListener("pointercancel", fn);
			el.addEventListener("touchend", fn, { passive: true });
			el.addEventListener("touchcancel", fn, { passive: true });
		}

		// ===== MOBIL SEEK =====
		if (mobileSeekSlider) {
			onDragStart(mobileSeekSlider, () => { felhasznaloSeek = true; });

			// input: csak UI frissítés, nincs szerver hívás
			mobileSeekSlider.addEventListener("input", function () {
				felhasznaloSeek = true; // biztosítjuk, hogy be van állítva
				porget = this.value;
				if (seekSlider) seekSlider.value = this.value;
			});

			// Húzás vége: szerver hívás
			onDragEnd(mobileSeekSlider, function () {
				if (!felhasznaloSeek) return;
				porget = mobileSeekSlider.value;
				if (seekSlider) seekSlider.value = mobileSeekSlider.value;
				felhasznaloSeek = false;
				setPorget();
			});
		}

		// ===== MOBIL VOLUME =====
		if (mobileVolumeSlider) {
			onDragStart(mobileVolumeSlider, () => { felhasznaloVolume = true; });

			mobileVolumeSlider.addEventListener("input", function () {
				felhasznaloVolume = true;
				volume = this.value;
				if (volumeSlider) volumeSlider.value = this.value;
			});

			onDragEnd(mobileVolumeSlider, function () {
				if (!felhasznaloVolume) return;
				volume = mobileVolumeSlider.value;
				if (volumeSlider) volumeSlider.value = mobileVolumeSlider.value;
				felhasznaloVolume = false;
				setVolume();
			});
		}

		function toggleNav() {
			const menu = document.getElementById("navbarMobil");
			const icon = document.getElementById("nav-hamburger-icon");
			const open = menu.classList.contains("d-none");
			menu.classList.toggle("d-none", !open);
			icon.className = open ? "bi bi-x" : "bi bi-list";
		}
	</script>
