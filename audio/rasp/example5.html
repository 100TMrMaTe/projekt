<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspberry Pi YouTube vezérlés</title>
</head>

<body>

    <div id="player"></div>

    <script>
        //változok deklarálása
        let videoFromDB = null;
        let player;
        let statusFromDB = null;
        let lengthFromDB = null;
        let current_timeFromDB = null;
        let volumeFromDB = null;
        let length = null;
        let current_time = null;
        let porget = null;

        //adatok lekérdezése adatbázisbol
        fetchVideoData();



        //adatok lekérdezése adatbázisbol
        function fetchVideoData() {
            fetch("../../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "test1"
                })
            })
                .then(response => response.json())
                .then(data => {
                    console.log("DB adat:", data);
                    if (!data.error) {
                        videoFromDB = data.video_id;
                        statusFromDB = data.status;
                        lengthFromDB = data.length;
                        current_timeFromDB = data.current_time;
                        volumeFromDB = data.volume;
                        porget = data.porget;
                        //console.log(porget - current_timeFromDB);
                        loadYouTubeAPI();
                    } else {
                        //Console.log("Hiba:", data.error);
                    }
                })
                .catch(error => console.error("Fetch hiba:", error));

        }


        //video hosszának átadása az adatbázisnak
        function setLength() {
            //Console.log(length);
            fetch("../../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "setLength",
                    hossz: length
                })
            })
                .then(response => response.json())
                .then(data => {
                    //Console.log(data);
                })
                .catch(error => console.error("Fetch hiba:", error));
        }

        //jelenlegi idó átadása az adatbázisnak
        function setCurrentTime() {
            //Console.log(current_time);
            fetch("../../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "setCurrentTime",
                    ido: current_time
                })
            })
                .then(response => response.json())
                .then(data => {
                    //Console.log(data);
                })
                .catch(error => console.error("Fetch hiba:", error));
        }


        //adatok lekérdezése adatbázisbol (uj player látrehozása nélkül)
        function fetchData() {
            fetch("../../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "test1"
                })
            })
                .then(response => response.json())
                .then(data => {
                    //Console.log("DB adat:", data);
                    if (!data.error) {
                        videoFromDB = data.video_id;
                        statusFromDB = data.status;
                        lengthFromDB = data.length;
                        current_timeFromDB = data.current_time;
                        volumeFromDB = data.volume;
                        porget = data.porget;
                    } else {
                    }
                })
                .catch(error => console.error("Fetch hiba:", error));
        }


        //YouTube API betöltés
        function loadYouTubeAPI() {
            var tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.body.appendChild(tag);

        }


        //
        function onYouTubeIframeAPIReady() {
            if (!videoFromDB) return;

            player = new YT.Player('player', {
                height: '390',
                width: '640',
                videoId: videoFromDB, // DB-ből jön
                playerVars: {
                    'playsinline': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function noSeek() {
            fetch("../../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "noSeek"
                })
            })
                .then(response => response.json())
                .then(data => {
                    console.log(data);
                })
                .catch(error => console.error("Fetch hiba:", error));
        }

        function update() {
            fetchData();
            if (player) {
                length = Math.floor(player.getDuration());
                current_time = Math.floor(player.getCurrentTime());
                setLength();
                if (porget != -1) {-
                    player.seekTo(porget);
                    noSeek();
                } else {
                    setCurrentTime();
                }
                if (statusFromDB == 1) {
                    player.playVideo();
                } else {
                    player.pauseVideo();
                }
                if (player.getVolume() != volumeFromDB) {
                    player.setVolume(volumeFromDB);
                }
                /*
                if (player.getCurrentTime() != current_timeFromDB) {
                    player.seekTo(current_timeFromDB);
                }
                */
            }
        }

        function onPlayerReady(event) {
            if (statusFromDB == 1) {
                event.target.playVideo();
            } else {
                event.target.pauseVideo();
            }
        }


        function onPlayerStateChange(event) {
            //Console.log("Player state:", event.data);
        }


        setInterval(update, 100);

    </script>

</body>

</html>
