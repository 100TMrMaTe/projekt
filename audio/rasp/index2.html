<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>rasp</title>
</head>

<body>
    <div id="player"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let apiReady = false;
        let serverData = null;

        // 1️⃣ YouTube API betöltve
        function onYouTubeIframeAPIReady() {
            apiReady = true;
            tryInitPlayer();
        }

        // 2️⃣ Szerver adat lekérése
        async function fetchData() {
            const response = await fetch('http://localhost/.../index.php', {
                method: 'POST',
                body: JSON.stringify({ muvelet: 'test1' }),
            });
            serverData = await response.json();
            tryInitPlayer();
        }
        fetchData();

        // 3️⃣ Player létrehozása, ha minden kész
        function tryInitPlayer() {
            if (!apiReady || !serverData) return;

            if (!player) {
                console.log("Player létrehozása video ID-vel:", serverData.video_id);
                player = new YT.Player('player', {
                    height: '345',
                    width: '420',
                    videoId: serverData.video_id,
                    playerVars: {
                        autoplay: 1,
                        mute: 1 // hanggal csak ha Chromium flag van
                    },
                    events: { onReady: onPlayerReady }
                });
            } else {
                // Ha már van player, csak állítjuk
                if (serverData.status) {
                    player.unMute();
                    player.playVideo();
                    console.log("Videó lejátszása, hanggal");
                }
                else {
                    player.pauseVideo();
                }
            }
        }

        function onPlayerReady(event) {
            if (serverData.status) event.target.playVideo();
        }

        // 4️⃣ Frissítés pl. 5 másodpercenként az adatbázisból
        setInterval(fetchData, 5000);
    </script>


</body>

</html>
