<!DOCTYPE html>
<html>

<body>

    <div id="player"></div>

    <script>
        let videoFromDB = null;
        let player;

        function loadYouTubeAPI() {
            var tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.body.appendChild(tag);

            // Call the onYouTubeIframeAPIReady function when the script is loaded
            tag.onload = onYouTubeIframeAPIReady;
            console.log("YouTube API betöltve");
        }

        function onYouTubeIframeAPIReady() {
            console.log("YouTube API ready, videoFromDB:", videoFromDB);
            if (!videoFromDB) return;

            player = new YT.Player('player', {
                height: '390',
                width: '640',
                videoId: videoFromDB, // DB-ből jön
                playerVars: {
                    'playsinline': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        fetch("../../index.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                muvelet: "test1"
            })
        })
            .then(response => response.json())
            .then(data => {
                console.log("DB adat:", data);
                if (!data.error) {
                    console.log(data);
                    videoFromDB = data.video_id;
                    loadYouTubeAPI();
                } else {
                    console.log("Hiba:", data.error);
                }
            })
            .catch(error => console.error("Fetch hiba:", error));

        function onPlayerReady(event) {
            event.target.playVideo();
        }

        function onPlayerStateChange(event) {
            console.log("Player state:", event.data);
        }

    </script>

</body>

</html>
