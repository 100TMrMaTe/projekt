<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server</title>
</head>

<body>
    <div id="player"></div>

    <script>
        let videoFromDB = null;
        let player;
        let statusFromDB = null;
        let lengthFromDB = null;
        let current_timeFromDB = null;
        let volumeFromDB = null;
        let length = null;
        let current_time = null;
        let porget = null;

        //adatok lekérdezése adatbázisbol
        getVideoDataFirst();


        function loadYouTubeAPI() {
            var tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.body.appendChild(tag);

        }

        function onYouTubeIframeAPIReady() {
            if (!videoFromDB) return;

            player = new YT.Player('player', {
                height: '390',
                width: '640',
                videoId: videoFromDB, // DB-ből jöns
                playerVars: {
                    'playsinline': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }



        function getVideoDataFirst() {
            fetch("../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "getVideoData"
                })
            })
                .then(response => response.json())
                .then(data => {
                    console.log("DB adat:", data);
                    videoFromDB = data.video_id;
                    statusFromDB = data.status;
                    lengthFromDB = data.length;
                    current_timeFromDB = data.current_time;
                    volumeFromDB = data.volume;
                    porget = data.porget;
                    loadYouTubeAPI();

                })
                .catch(error => console.error("Fetch hiba:", error));
        }

        function getVideoData() {
            fetch("../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "getVideoData"
                })
            })
                .then(response => response.json())
                .then(data => {
                        videoFromDB = data.video_id;
                        statusFromDB = data.status;
                        lengthFromDB = data.length;
                        current_timeFromDB = data.current_time;
                        volumeFromDB = data.volume;
                        porget = data.porget;

                })
                .catch(error => console.error("Fetch hiba:", error));
        }


        function onPlayerReady(event) {
            if (statusFromDB == 1) {
                event.target.playVideo();
            } else {
                event.target.pauseVideo();
            }
        }

        function onPlayerStateChange(event) {
        }

        function update(){
            getVideoData();
            if (player) {
                if (statusFromDB == 1) {
                    player.playVideo();
                } else {
                    player.pauseVideo();
                }
            }
        }

        setInterval(update, 100);


    </script>
</body>

</html>
