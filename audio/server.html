<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server</title>
</head>

<body>
    <div id="player"></div>

    <script>
        let videoFromDB = null;
        let player;
        let statusFromDB = null;
        let lengthFromDB = null;
        let length = null;
        let current_timeFromDB = null;
        let volumeFromDB = null;
        let current_time = null;
        let porget = null;
        let videoEnded = false;
        let playlistEmpty = false;

        //adatok lekérdezése adatbázisbol
        getVideoDataFirst();


        function loadYouTubeAPI() {
            var tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.body.appendChild(tag);
        }


        function onYouTubeIframeAPIReady() {
            if (!videoFromDB) return;

            player = new YT.Player('player', {
                height: '390',
                width: '640',
                videoId: videoFromDB, // DB-ből jöns
                playerVars: {
                    'playsinline': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }



        function getVideoDataFirst() {
            fetch("../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "getVideoData"
                })
            })
                .then(response => response.json())
                .then(data => {
                    console.log("DB adat:", data);
                    videoFromDB = data.video_id;
                    statusFromDB = data.status;
                    lengthFromDB = data.length;
                    current_timeFromDB = data.current_time;
                    volumeFromDB = data.volume;
                    porget = data.porget;
                    loadYouTubeAPI();

                })
                .catch(error => console.error("Fetch hiba:", error));
        }

        function getVideoData() {
            fetch("../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "getVideoData"
                })
            })
                .then(response => response.json())
                .then(data => {
                    videoFromDB = data.video_id;
                    statusFromDB = data.status;
                    lengthFromDB = data.length;
                    current_timeFromDB = data.current_time;
                    volumeFromDB = data.volume;
                    porget = data.porget;

                })
                .catch(error => console.error("Fetch hiba:", error));
        }


        function onPlayerReady(event) {
            if (statusFromDB == 1) {
                event.target.playVideo();
            } else {
                event.target.pauseVideo();
            }
        }


        //jelenlegi idó átadása az adatbázisnak
        function setCurrentTime() {
            fetch("../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "setCurrentTime",
                    time: current_time
                })
            })
                .then(response => response.json())
                .then(data => {
                })
                .catch(error => console.error("Fetch hiba:", error));
        }

        function setLength() {
            fetch("../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "setLength",
                    hossz: length
                })
            })
                .then(response => response.json())
                .then(data => {
                })
                .catch(error => console.error("Fetch hiba:", error));
        }


        function noSeek() {
            fetch("../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "noSeek"
                })
            })
                .then(response => response.json())
                .then(data => {
                })
                .catch(error => console.error("Fetch hiba:", error));
        }

        function isPlaylistEmpty() {
            fetch("../index.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    muvelet: "isPlaylistEmpty"
                })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.empty) {
                        playlistEmpty = true;
                    } else {
                        playlistEmpty = false;
                    }
                })
                .catch(error => console.error("Fetch hiba:", error));
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.ENDED) {
                videoEnded = true;
                console.log("Video vége");
                isPlaylistEmpty();
                if (playlistEmpty) {
                    //ha a playlist üres amrad a szám és újraindul
                } else {
                    //ez fut le ha van a playlistben következő videó

                    fetch("../index.php", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            muvelet: "moveFirstToCurrentlyPlaying"
                        })
                    })
                        .then(response => response.json())
                        .then(data => {

                            return fetch("../index.php", {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json"
                                },
                                body: JSON.stringify({
                                    muvelet: "getVideoData"
                                })
                            });
                        })
                        .then(response => response.json())
                        .then(newData => {

                            videoFromDB = newData.video_id;

                            if (player && videoFromDB) {
                                player.loadVideoById(videoFromDB);
                            }

                        })
                        .catch(error => console.error("Fetch hiba:", error));
                }

            } else {
                videoEnded = false;
            }
        }


        function currentyPlayingIsNull() {
            console.log(videoFromDB)
            if (videoFromDB == null) {
                fetch("../index.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        muvelet: "addToCurrentlyPlaying"
                    })
                })
                    .then(response => response.json())
                    .then(data => {

                    })
                    .catch(error => console.error("Fetch hiba:", error));
            }
        }

        function update() {
            getVideoData();
            currentyPlayingIsNull();
            if (player) {
                if(videoFromDB == null || player.getVideoData().video_id == null){
                    return;
                }
                const currentVideoId = player.getVideoData().video_id;
                if (currentVideoId !== videoFromDB) {
                    player.loadVideoById(videoFromDB);
                    return;
                }


                current_time = Math.floor(player.getCurrentTime());
                length = Math.floor(player.getDuration());
                if (statusFromDB == 1) {
                    player.playVideo();
                } else {
                    player.pauseVideo();
                }
                if (player.getVolume() != volumeFromDB) {
                    player.setVolume(volumeFromDB);
                }
                if (porget != -1) {
                    player.seekTo(porget);
                    noSeek();
                } else {
                    setCurrentTime();
                }
            }
        }


        setInterval(update, 100);

    </script>
</body>

</html>
